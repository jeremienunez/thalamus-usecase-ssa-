name: Repo Contracts

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  repo-contracts:
    name: arch + test-policy + spec-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run architecture boundaries check
        run: pnpm arch:check

      - name: Run test policy check
        run: pnpm test:policy

      - name: Run spec traceability check
        run: pnpm spec:check
