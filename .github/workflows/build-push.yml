name: Build & Push

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "infra/docker/**"
      - ".dockerignore"
      - "pnpm-lock.yaml"
      - ".github/workflows/build-push.yml"
  workflow_dispatch:

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # GHCR push

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/console-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/console

jobs:
  build:
    name: build-${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: console-api
            dockerfile: infra/docker/console-api.Dockerfile
            image_env: IMAGE_API
          - image: console
            dockerfile: infra/docker/console.Dockerfile
            image_env: IMAGE_WEB
    outputs:
      api-digest: ${{ steps.meta-api.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        uses: docker/metadata-action@v5
        with:
          images: ${{ env[matrix.image_env] }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push ${{ matrix.image }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: false

      - name: Image digest (${{ matrix.image }})
        id: meta-api
        run: echo "digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  smoke:
    name: k6 smoke (compose)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build smoke images
        run: |
          docker compose \
            -f docker-compose.yml \
            -f infra/docker-compose.prod.yml \
            build console-api console

      - name: Boot dependencies
        run: |
          docker compose \
            -f docker-compose.yml \
            -f infra/docker-compose.prod.yml \
            up -d --wait --wait-timeout 180 postgres redis

      - name: Migrate schema
        run: |
          docker compose \
            -f docker-compose.yml \
            -f infra/docker-compose.prod.yml \
            run --rm migrate

      - name: Boot stack
        run: |
          docker compose \
            -f docker-compose.yml \
            -f infra/docker-compose.prod.yml \
            up -d --wait --wait-timeout 180 console-api console nginx

      - name: k6 smoke
        run: |
          mkdir -p infra/k6/results && chmod 777 infra/k6/results
          BASE_URL=http://nginx docker compose \
            -f docker-compose.yml \
            -f infra/docker-compose.prod.yml \
            -f infra/k6/docker-compose.k6.yml \
            run --rm --no-deps -e BASE_URL=http://nginx k6

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f infra/docker-compose.prod.yml \
            logs --no-color --tail=200

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.yml -f infra/docker-compose.prod.yml down -v

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: infra/k6/results/
          if-no-files-found: ignore
          retention-days: 14
