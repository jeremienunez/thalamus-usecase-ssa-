apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: thalamus
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: pg
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: thalamus
data:
  # Populated by `kubectl create cm postgres-init --from-file=init.sql=infra/postgres/init.sql -n thalamus --dry-run=client -o yaml | kubectl apply -f -`
  # Placeholder keeps the manifest valid even before the operator runs that command.
  init.sql: |
    -- see infra/postgres/init.sql — apply via:
    -- kubectl -n thalamus create configmap postgres-init \
    --   --from-file=init.sql=infra/postgres/init.sql --dry-run=client -o yaml \
    --   | kubectl apply -f -
    SELECT 1;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: thalamus
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
              name: pg
          envFrom:
            - secretRef:
                name: postgres-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "thalamus", "-d", "thalamus"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "thalamus"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "2", memory: "2Gi" }
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
