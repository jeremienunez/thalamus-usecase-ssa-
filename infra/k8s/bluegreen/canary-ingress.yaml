# Lightweight alternative to blue/green: shift a % of traffic to the new color
# via two Ingress objects sharing the same host. Requires ingress-nginx.
#
# Step up the weight (`10 → 25 → 50 → 100`), then merge into the main Ingress.
# Keep live Service backing the old color; the canary Ingress routes a slice
# of requests to the idle color instead.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thalamus-canary
  namespace: thalamus
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "10"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - host: thalamus.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: console-api-preview # the *idle* color
                port: { name: http }
          - path: /health
            pathType: Exact
            backend:
              service:
                name: console-api-preview
                port: { name: http }
