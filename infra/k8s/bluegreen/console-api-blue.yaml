apiVersion: apps/v1
kind: Deployment
metadata:
  name: console-api-blue
  namespace: thalamus
  labels:
    app: console-api
    color: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: console-api
      color: blue
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  template:
    metadata:
      labels:
        app: console-api
        color: blue
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9464"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/thalamus/console-api:blue # pin via kustomize/helm per release
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 4000, name: http }
            - { containerPort: 9464, name: metrics }
          envFrom:
            - configMapRef: { name: console-api-env }
            - secretRef: { name: console-api-secrets }
          env:
            - name: DEPLOY_COLOR
              value: blue
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits: { cpu: "2", memory: "2Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: console-api-blue
  namespace: thalamus
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: console-api, color: blue }
