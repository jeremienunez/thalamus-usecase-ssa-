# Helm values for prometheus-community/kube-prometheus-stack.
# Install:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm upgrade --install kube-prometheus-stack \
#     prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     -f infra/k8s/observability/kube-prometheus-stack.values.yaml
#
# Labels the monitoring namespace with `kubernetes.io/metadata.name=monitoring`
# so the NetworkPolicy `api-allow-console-and-ingress` matches scrapes.

fullnameOverride: kube-prometheus-stack

# Scrape everything with `release: kube-prometheus-stack` label — our
# ServiceMonitor for console-api has this label.
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    retention: 15d
    resources:
      requests: { cpu: 200m, memory: 1Gi }
      limits: { cpu: "2", memory: 4Gi }
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources: { requests: { storage: 50Gi } }

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources: { requests: { storage: 5Gi } }
  config:
    route:
      group_by: [alertname, severity]
      receiver: "null"
      routes:
        - matchers: [severity = critical]
          receiver: "pager" # wire to PagerDuty/OpsGenie/Slack when real
    receivers:
      - name: "null"
      - name: "pager"
        # webhook_configs:
        #   - url: https://hooks.slack.com/services/...

grafana:
  adminPassword: admin # CHANGE ME — or `existingSecret: grafana-admin`
  defaultDashboardsTimezone: browser
  persistence: { enabled: true, size: 5Gi }
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring.svc:80
      access: proxy

# metrics-server is bundled — we don't need a separate install.
kube-state-metrics: { enabled: true }
nodeExporter: { enabled: true }
prometheusOperator: { enabled: true }
