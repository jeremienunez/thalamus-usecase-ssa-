# Template. Copy to secret.yaml, fill, apply. NEVER commit real values.
# Preferred in real setups: external-secrets / sealed-secrets / SOPS.
apiVersion: v1
kind: Secret
metadata:
  name: console-api-secrets
  namespace: thalamus
type: Opaque
stringData:
  DATABASE_URL: postgres://thalamus:thalamus@postgres:5432/thalamus
  REDIS_URL: redis://redis:6379
  OPENAI_API_KEY: ""
  MOONSHOT_API_KEY: ""
  PERPLEXITY_API_KEY: ""
  VOYAGE_API_KEY: ""
  DEEPSEEK_API_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: thalamus
type: Opaque
stringData:
  POSTGRES_USER: thalamus
  POSTGRES_PASSWORD: thalamus
  POSTGRES_DB: thalamus
