apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thalamus
  namespace: thalamus
  annotations:
    # SSE / LLM streaming: disable buffering, widen timeouts.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    # TLS — cert-manager issues + renews the cert declared in `tls.secretName`.
    # Start with staging to validate the HTTP-01 challenge; flip to prod when ok.
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Force https redirect at the ingress (308).
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [thalamus.example.com] # CHANGE ME
      secretName: thalamus-tls
  rules:
    - host: thalamus.example.com # CHANGE ME
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: console-api
                port: { name: http }
          - path: /health
            pathType: Exact
            backend:
              service:
                name: console-api
                port: { name: http }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: console
                port: { name: http }
