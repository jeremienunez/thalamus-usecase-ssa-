# Overlay that adds only k6 runners.
#
# Usage:
#   docker compose -f docker-compose.yml -f infra/docker-compose.prod.yml up -d --build nginx
#   docker compose -f docker-compose.yml -f infra/docker-compose.prod.yml \
#     -f infra/k6/docker-compose.k6.yml \
#     run --rm k6 run /scripts/smoke.js
#
# Run a specific scenario:
#   K6_SCRIPT=load.js docker compose ... run --rm k6

services:
  k6:
    image: grafana/k6:0.54.0
    container_name: thalamus-k6
    environment:
      BASE_URL: http://nginx
      K6_OUT: "json=/results/${K6_SCRIPT:-smoke.js}.json"
    volumes:
      - ./infra/k6/scripts:/scripts:ro
      - ./infra/k6/results:/results
    entrypoint: ["k6"]
    command: ["run", "/scripts/${K6_SCRIPT:-smoke.js}"]
    networks: [default]

  k6-dashboard:
    # Optional: live web dashboard. Browse http://localhost:5665 while a run is active.
    image: grafana/k6:0.54.0
    profiles: ["dashboard"]
    environment:
      BASE_URL: http://nginx
      K6_WEB_DASHBOARD: "true"
      K6_WEB_DASHBOARD_EXPORT: /results/dashboard.html
      K6_WEB_DASHBOARD_HOST: 0.0.0.0
      K6_WEB_DASHBOARD_PORT: "5665"
    volumes:
      - ./infra/k6/scripts:/scripts:ro
      - ./infra/k6/results:/results
    ports:
      - "5665:5665"
    entrypoint: ["k6"]
    command: ["run", "/scripts/${K6_SCRIPT:-load.js}"]
    networks: [default]

networks:
  default:
    name: thalamus-net
