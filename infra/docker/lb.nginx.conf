# Edge load balancer: routes `/` → console SPA, `/api` + `/health` → console-api.
# Upstreams use Docker embedded DNS so `docker compose up --scale console-api=N`
# is picked up without rebuilding or editing this file.

worker_processes auto;
events { worker_connections 2048; }

http {
  resolver 127.0.0.11 valid=10s ipv6=off;   # Docker embedded DNS
  resolver_timeout 5s;

  log_format main '$remote_addr - $upstream_addr "$request" '
                  '$status $body_bytes_sent rt=$request_time urt=$upstream_response_time';
  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  server_tokens off;

  gzip on;
  gzip_types application/json application/javascript text/css text/plain image/svg+xml;
  gzip_min_length 1024;

  # Per-IP rate limit on the api surface. Tune for your traffic.
  limit_req_zone $binary_remote_addr zone=api_rl:10m rate=50r/s;

  server {
    listen 80 default_server;
    server_name _;

    location = /healthz {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    location /api/ {
      limit_req zone=api_rl burst=100 nodelay;

      set $api_upstream console-api:4000;
      proxy_pass         http://$api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_buffering    off;        # SSE / LLM streaming
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location = /health {
      set $api_upstream console-api:4000;
      proxy_pass http://$api_upstream/health;
    }

    location / {
      set $web_upstream console:8080;
      proxy_pass         http://$web_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
