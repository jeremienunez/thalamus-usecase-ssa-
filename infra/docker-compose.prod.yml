# Prod-like overlay on top of docker-compose.yml (pg + redis).
# Adds: scalable console-api, console SPA, nginx edge load balancer.
#
#   docker compose \
#     -f docker-compose.yml \
#     -f infra/docker-compose.prod.yml \
#     up --build --scale console-api=3
#
#   Browse http://localhost            → console SPA
#           http://localhost/api/stats → api via LB
#           http://localhost/healthz   → LB liveness
#
# Combine with k6 (point BASE_URL at the LB, not the api directly):
#   BASE_URL=http://nginx docker compose \
#     -f docker-compose.yml -f infra/docker-compose.prod.yml \
#     -f infra/k6/docker-compose.k6.yml run --rm k6

services:
  # One-shot: applies pre-drizzle SQL, drizzle-tracked migrations, post-drizzle SQL.
  # Re-run safely on every deploy — every statement is idempotent.
  #   docker compose ... run --rm migrate
  migrate:
    image: thalamus/console-api:dev
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://thalamus:thalamus@postgres:5432/thalamus
    working_dir: /app/packages/db-schema
    entrypoint: ["node", "--import", "tsx", "src/migrate.ts"]
    restart: "no"
    networks: [default]

  console-api:
    build:
      context: .
      dockerfile: infra/docker/console-api.Dockerfile
    image: thalamus/console-api:dev
    # No container_name / no host ports — scaling multiple replicas requires both.
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgres://thalamus:thalamus@postgres:5432/thalamus
      REDIS_URL: redis://redis:6379
      THALAMUS_MODE: fixtures
      LOG_LEVEL: info
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [default]

  console:
    build:
      context: .
      dockerfile: infra/docker/console.Dockerfile
      args:
        VITE_API_BASE: /api
    image: thalamus/console:dev
    depends_on:
      console-api: { condition: service_healthy }
    restart: unless-stopped
    networks: [default]

  nginx:
    image: nginx:1.27-alpine
    container_name: thalamus-lb
    depends_on:
      console-api: { condition: service_healthy }
      console: { condition: service_started }
    ports:
      - "8088:80"
    volumes:
      - ./infra/docker/lb.nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [default]

networks:
  default:
    name: thalamus-net
